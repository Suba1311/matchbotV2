# Provider 1 — Excel (.xlsx). One YAML file is the ENTIRE onboarding surface.
provider_id: provider1_education
display_name: "Provider 1 — Education (Excel)"
format: xlsx
file_glob: "provider1_*.xlsx"
has_header: true
sheet_name: null            # first sheet

column_mappings:            # raw file column  ->  canonical attribute
  FirstName:   first_name
  MiddleName:  middle_name
  LastName:    last_name
  DOB:         birth_date
  SSN:         ssn
  Gender:      gender
  Address:     address1
  Address2:    address2
  City:        city
  State:       state
  Zip:         zip

transforms:
  birth_date: { type: date, format: "%Y-%m-%d" }
  ssn:        { type: string, zero_pad: 9, strip: ["-", " "] }
  state:      { type: string, upper: true }
  zip:        { type: string, strip: [" "] }

skip_if_null: [last_name]
